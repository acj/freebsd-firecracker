name: CI

on:
  push:
    branches:
      - main
    tags:
      - v*
  schedule:
    - cron: '0 6 * * 3'
  workflow_dispatch:

permissions:
  contents: write

env:
  FIRECRACKER_VERSION: "1.16.0"
  FREEBSD_VERSION: "15.0-RELEASE"

jobs:
  kernel:
    name: Build Kernel and Rootfs (${{ matrix.target }})
    # Both targets build on the amd64 runner inside an amd64 FreeBSD build VM.
    # The arm64 artifacts are cross-built there: GitHub's hosted arm64 runners
    # don't expose /dev/kvm, so we couldn't run the build VM (or a Firecracker
    # boot test) on them anyway. See mac/README.md for how to boot-test the
    # aarch64 artifacts on Apple Silicon.
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: amd64
            target_arch: amd64
            artifact_suffix: ""
          - target: arm64
            target_arch: aarch64
            artifact_suffix: "-aarch64"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Display CPU info
        run: lscpu

      - name: Enable KVM access
        # /dev/kvm is root:kvm 0660 on GHA runners, and the runner user isn't in the kvm group
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          test -w /dev/kvm && echo "KVM is available and writable"

      - name: Install VM tools
        run: |
          sudo apt-get update
          sudo apt-get install -qq -o=Dpkg::Use-Pty=0 qemu-system-x86 qemu-utils cloud-image-utils

      - name: Clear additional space on runner
        run: |
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          sudo rm -rf /var/cache/apt/archives/*
          sudo rm -rf /usr/share/doc/*

          # https://github.com/actions/runner-images/issues/2840
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Download FreeBSD VM image
        run: |
          curl -sSL "https://download.freebsd.org/releases/VM-IMAGES/${FREEBSD_VERSION}/amd64/Latest/FreeBSD-${FREEBSD_VERSION}-amd64-BASIC-CLOUDINIT-ufs.qcow2.xz" | xz -d > freebsd.qcow2

          # Scratch disk for the source tree and build output so that we don't need to resize the official image's root filesystem
          qemu-img create -f raw work.img 5G

      - name: Set up VM
        run: |
          chmod 600 freebsd.id_rsa

          mkdir -p ~/.ssh
          cat >> ~/.ssh/config <<EOF
          Host fbsd
            HostName localhost
            Port 2222
            User root
            IdentityFile $PWD/freebsd.id_rsa
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            LogLevel ERROR
          EOF

          # cloud-init runs this (as root) on first boot
          cat > user-data <<EOF
          #!/bin/sh
          mkdir -p /root/.ssh
          chmod 700 /root/.ssh
          echo "$(cat freebsd.id_rsa.pub)" > /root/.ssh/authorized_keys
          chmod 600 /root/.ssh/authorized_keys
          sed -i '' -e 's/^#PermitRootLogin no/PermitRootLogin yes/' /etc/ssh/sshd_config
          sysrc sshd_enable=YES
          service sshd restart || service sshd start
          EOF
          echo "instance-id: freebsd-builder" > meta-data
          cloud-localds seed.iso user-data meta-data

          qemu-system-x86_64 \
            -machine q35,accel=kvm \
            -cpu host \
            -smp "$(nproc)" \
            -m 13312M \
            -drive file=freebsd.qcow2,if=virtio,format=qcow2,cache=unsafe \
            -drive file=work.img,if=virtio,format=raw,cache=unsafe \
            -cdrom seed.iso \
            -netdev user,id=net0,hostfwd=tcp:127.0.0.1:2222-:22 \
            -device virtio-net-pci,netdev=net0 \
            -device virtio-rng-pci \
            -display none \
            -daemonize \
            -serial file:serial.log \
            -pidfile qemu.pid

          for i in $(seq 1 60); do
            if ssh -o ConnectTimeout=5 fbsd true 2>/dev/null; then
              echo "VM is up"
              break
            fi
            if [ "$i" = "60" ]; then
              echo "VM failed to come up; serial console output follows" >&2
              cat serial.log >&2
              exit 1
            fi
            sleep 5
          done

          scp setup-vm.sh build-freebsd.sh prepare-rootfs.sh freebsd-amd-tsc-init.patch freebsd-mptables.patch freebsd.id_rsa.pub fbsd:/root/
          ssh fbsd /root/setup-vm.sh
          ssh fbsd df -h

      - name: Build FreeBSD rootfs and kernel
        run: |
          ssh fbsd FREEBSD_VERSION="${FREEBSD_VERSION}" TARGET="${{ matrix.target }}" TARGET_ARCH="${{ matrix.target_arch }}" /root/build-freebsd.sh
          ssh fbsd df -h

      - name: Prepare rootfs
        run: |
          ssh fbsd FREEBSD_VERSION="${FREEBSD_VERSION}" TARGET="${{ matrix.target }}" /root/prepare-rootfs.sh
          ssh fbsd df -h

      - name: Copy kernel artifacts
        run: |
          scp fbsd:/work/freebsd-kern.bin "freebsd-kern${{ matrix.artifact_suffix }}.bin"
          scp fbsd:/work/freebsd-rootfs.bin.xz "freebsd-rootfs${{ matrix.artifact_suffix }}.bin.xz"

      - name: Verify aarch64 kernel image format
        if: matrix.target == 'arm64'
        # Firecracker's aarch64 loader requires a Linux arm64 Image-format
        # kernel; check for the "ARMd" magic at offset 0x38. We can't
        # boot-test on GitHub's arm64 runners (no /dev/kvm), so this is the
        # best in-CI smoke test we have.
        run: |
          magic="$(dd if=freebsd-kern-aarch64.bin bs=1 skip=56 count=4 2>/dev/null)"
          if [ "$magic" != "ARMd" ]; then
            echo "FAIL: freebsd-kern-aarch64.bin lacks the arm64 Image header magic (got '$magic')" >&2
            exit 1
          fi
          echo "arm64 Image header magic OK"

      - name: Serve built artifacts for the boot test
        if: matrix.target == 'amd64'
        run: |
          set -eux
          wget -q -O- "https://github.com/firecracker-microvm/firecracker/releases/download/v${FIRECRACKER_VERSION}/firecracker-v${FIRECRACKER_VERSION}-x86_64.tgz" | tar zxf -
          cp "release-v${FIRECRACKER_VERSION}-x86_64/firecracker-v${FIRECRACKER_VERSION}-x86_64" firecracker
          nohup python3 -m http.server 8000 >/tmp/httpd.log 2>&1 &
          for i in $(seq 1 20); do
            if curl -fsS "http://127.0.0.1:8000/freebsd-kern.bin" -o /dev/null; then break; fi
            sleep 1
          done

      - name: Boot-test with freebsd-firecracker-action
        if: matrix.target == 'amd64'
        uses: acj/freebsd-firecracker-action@v0.10.1
        with:
          kernel-url: http://127.0.0.1:8000/freebsd-kern.bin
          rootfs-url: http://127.0.0.1:8000/freebsd-rootfs.bin.xz
          firecracker-url: http://127.0.0.1:8000/firecracker
          ssh-public-key-url: http://127.0.0.1:8000/freebsd.id_rsa.pub
          ssh-private-key-url: http://127.0.0.1:8000/freebsd.id_rsa
          checkout: false
          verbose: true
          pre-run: ""
          post-run: ""
          run-in-vm: |
            set -eux
            uname -a
            bash --version | head -1
            rsync --version | head -1
            service -e

            for f in /usr/bin/cc /usr/bin/clang /usr/bin/lldb /usr/include /rescue \
                     /usr/lib/clang /sbin/zfs /usr/sbin/dtrace /usr/sbin/bhyve \
                     /sbin/pfctl /sbin/ipfw /sbin/ipf /usr/sbin/ngctl \
                     /usr/sbin/freebsd-update /usr/sbin/mailwrapper /usr/sbin/sendmail \
                     /usr/sbin/ntpd /usr/sbin/ppp /usr/sbin/bsnmpd; do
              if [ -e "$f" ]; then echo "FAIL: $f should have been trimmed" >&2; exit 1; fi
            done
            for f in /bin/sh /usr/sbin/sshd /sbin/init /usr/local/bin/bash /usr/local/bin/rsync; do
              test -e "$f" || { echo "FAIL: $f is missing" >&2; exit 1; }
            done
            echo "trim assertions passed"

      - name: Upload serial console log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: serial-console${{ matrix.artifact_suffix }}.log
          path: serial.log
          if-no-files-found: ignore

      - name: Archive kernel artifact
        uses: actions/upload-artifact@v7
        with:
          name: freebsd-kern${{ matrix.artifact_suffix }}.bin
          path: freebsd-kern${{ matrix.artifact_suffix }}.bin

      - name: Archive rootfs artifact
        uses: actions/upload-artifact@v7
        with:
          name: freebsd-rootfs${{ matrix.artifact_suffix }}.bin.xz
          path: freebsd-rootfs${{ matrix.artifact_suffix }}.bin.xz

  firecracker:
    name: Vendor Firecracker binary (${{ matrix.fc_arch }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - fc_arch: x86_64
            artifact: firecracker
          - fc_arch: aarch64
            artifact: firecracker-aarch64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Download binary
        run: |
          wget -q -O- "https://github.com/firecracker-microvm/firecracker/releases/download/v${{ env.FIRECRACKER_VERSION }}/firecracker-v${{ env.FIRECRACKER_VERSION }}-${{ matrix.fc_arch }}.tgz" | tar zxf -
          mv "release-v${{ env.FIRECRACKER_VERSION }}-${{ matrix.fc_arch }}/firecracker-v${{ env.FIRECRACKER_VERSION }}-${{ matrix.fc_arch }}" "${{ matrix.artifact }}"

      - name: Archive artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
  
  ssh-keys:
    name: Archive SSH keys
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Archive SSH public key
        uses: actions/upload-artifact@v7
        with:
          name: freebsd.id_rsa.pub
          path: freebsd.id_rsa.pub
        
      - name: Archive SSH private key
        uses: actions/upload-artifact@v7
        with:
          name: freebsd.id_rsa
          path: freebsd.id_rsa

  release:
    name: Publish release
    needs: [firecracker, kernel, ssh-keys]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04

    steps:
      - name: Download firecracker artifact
        uses: actions/download-artifact@v7
        with:
          name: firecracker
          path: firecracker

      - name: Download firecracker (aarch64) artifact
        uses: actions/download-artifact@v7
        with:
          name: firecracker-aarch64
          path: firecracker-aarch64

      - name: Download kernel artifact
        uses: actions/download-artifact@v7
        with:
          name: freebsd-kern.bin
          path: freebsd-kern.bin

      - name: Download kernel (aarch64) artifact
        uses: actions/download-artifact@v7
        with:
          name: freebsd-kern-aarch64.bin
          path: freebsd-kern-aarch64.bin

      - name: Download rootfs artifact
        uses: actions/download-artifact@v7
        with:
          name: freebsd-rootfs.bin.xz
          path: freebsd-rootfs.bin.xz

      - name: Download rootfs (aarch64) artifact
        uses: actions/download-artifact@v7
        with:
          name: freebsd-rootfs-aarch64.bin.xz
          path: freebsd-rootfs-aarch64.bin.xz

      - name: Download SSH public key
        uses: actions/download-artifact@v7
        with:
          name: freebsd.id_rsa.pub
          path: freebsd.id_rsa.pub

      - name: Download SSH private key
        uses: actions/download-artifact@v7
        with:
          name: freebsd.id_rsa
          path: freebsd.id_rsa

      - uses: marvinpinto/action-automatic-releases@919008cf3f741b179569b7a6fb4d8860689ab7f0 # v1.1.1
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          draft: true
          prerelease: false
          files: |
            firecracker
            firecracker-aarch64
            freebsd-kern.bin
            freebsd-kern-aarch64.bin
            freebsd-rootfs.bin.xz
            freebsd-rootfs-aarch64.bin.xz
            freebsd.id_rsa.pub
            freebsd.id_rsa